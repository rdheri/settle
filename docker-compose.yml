services:
  db:
    image: postgres:16-alpine
    container_name: settle-db
    environment:
      POSTGRES_USER: settle
      POSTGRES_PASSWORD: settle
      POSTGRES_DB: settle
    # Host 5433 -> container 5432 to avoid clashing with a local Postgres on 5432.
    ports:
      - '5433:5432'
    volumes:
      - settle-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U settle -d settle']
      interval: 2s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  # Optional: run the API in a container too (`docker compose up`). For local dev
  # you typically run just the db (`pnpm db:up`) and `pnpm dev` on the host.
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: settle-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Inside the compose network the database is reachable at db:5432.
      DATABASE_URL: postgres://settle:settle@db:5432/settle
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - '3000:3000'
    restart: unless-stopped

volumes:
  settle-pgdata:
